<title>Fleet Kanban — Simulated Demo</title>
<style>
  /* ── Faithful port of kanban_hub.py's stylesheet (GitHub dark) ───────────── */
  :root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--text:#c9d1d9;--dim:#8b949e;
        --codex:#3fb950;--kimi:#bc8cff;--opencode:#58a6ff;--any:#d29922;
        --claude:#ff9e64;--lead:#e3b341;

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:13px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
  header{display:flex;align-items:center;gap:16px;padding:10px 16px;
         border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5}
  header h1{font-size:15px;margin:0;font-weight:600}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .pulse{animation:p 1.4s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
  .agents{display:flex;gap:14px;margin-left:auto;font-size:12px;flex-wrap:wrap}
  .agent{display:flex;align-items:center;gap:4px}
  .badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px}
  .b-codex{background:rgba(63,185,80,.18);color:var(--codex)}
  .b-kimi{background:rgba(188,140,255,.18);color:var(--kimi)}
  .b-opencode{background:rgba(88,166,255,.18);color:var(--opencode)}
  .b-claude{background:rgba(255,158,100,.18);color:var(--claude)}
  .b-claude-lead{background:rgba(227,179,65,.22);color:var(--lead);border:1px solid var(--lead)}
  .b-any{background:rgba(210,153,34,.18);color:var(--any)}
  .b-detached{background:rgba(139,148,158,.18);color:var(--dim)}
  .agent .role{font-size:10px;color:var(--dim)}
  .agent .xn{font-size:10px;font-weight:700;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 5px}
  #updated{font-size:11px;color:var(--dim)}
  #tabs{display:flex;gap:2px;padding:8px 16px 0;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .tab{padding:7px 14px;border:1px solid var(--border);border-bottom:none;border-radius:7px 7px 0 0;
       cursor:pointer;font-size:12px;color:var(--dim);background:var(--bg);display:flex;gap:7px;align-items:center;position:relative}
  .tab.active{color:var(--text);background:var(--panel);border-color:#5b6673;font-weight:600}
  .tab .mini{font-size:10px;border-radius:8px;padding:0 6px;background:var(--bg);border:1px solid var(--border)}
  .tab .mini.hot{color:var(--work);border-color:var(--work)}
  .tab .mini.bad{color:var(--fail);border-color:var(--fail)}
  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:14px}
  .col{background:var(--panel);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;min-height:120px}
  .col h2{font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin:0;padding:9px 12px;
          border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .col h2 .n{background:var(--bg);border-radius:10px;padding:0 8px;font-size:11px;color:var(--dim)}
  .h-pending{color:var(--dim)} .h-claimed{color:var(--work)}
  .h-done{color:#58a6ff} .h-approved{color:var(--ok)} .h-failed{color:var(--fail)}
  #progress,#continuity{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
  #continuity{padding:6px 16px}
  #progress .big{font-size:17px;font-weight:700;color:var(--ok)}
  #progress .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  #progress .chip{font-size:11px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:2px 9px}
  #progress .phasetoggle{cursor:pointer;user-select:none;font-size:11px;font-weight:600;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:2px 10px}
  #progress .phasetoggle:hover{border-color:var(--work)}
  .cards{padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:calc(100vh - 230px)}
  .card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;cursor:pointer;transition:border-color .15s}
  .card:hover{border-color:#5b6673}
  .card .t{font-weight:500;margin-bottom:5px}
  .card .m{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--dim);flex-wrap:wrap}
  .card.failed{border-left:3px solid var(--fail)}
  .card.working{border-left:3px solid var(--work)}
  .card.done{border-left:3px solid var(--ok)}
  /* demo: a soft entrance + a lane-change flash so movement reads clearly on a projector */
  @keyframes cardin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .card.anim{animation:cardin .45s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 rgba(210,153,34,.0)}30%{box-shadow:0 0 0 2px rgba(210,153,34,.55)}100%{box-shadow:0 0 0 0 rgba(210,153,34,0)}}
  .card.move{animation:flash 1s ease}
  .tid{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--dim);margin-top:4px}
  .empty{color:var(--dim);font-size:12px;padding:14px;text-align:center;font-style:italic}
  /* Overview tab */
  #overview{padding:14px;display:none;flex-direction:column;gap:12px}
  .proj{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .proj .head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;cursor:pointer}
  .proj .head .nm{font-weight:600;font-size:14px}
  .proj .head .rt{font-size:11px;color:var(--dim);font-family:ui-monospace,Menlo,monospace}
  .proj .nums{display:flex;gap:8px;margin-left:auto}
  .proj .hot{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .proj .hotcard{font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--dim)}
  .proj .hotcard.f{border-color:var(--fail);color:var(--fail)}
  .capline{font-size:12px;color:var(--dim);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  /* ── Demo chrome (cursor, caption, controls, ribbon) — NOT part of the hub ── */
  #cursor{position:fixed;width:22px;height:22px;z-index:40;pointer-events:none;left:60px;top:60px;
          transition:left .85s cubic-bezier(.5,.05,.3,1),top .85s cubic-bezier(.5,.05,.3,1);
          filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
  #cursor.press{transform:scale(.82)}
  #cursor svg{display:block}
  .ripple{position:fixed;z-index:39;border:2px solid #fff;border-radius:50%;pointer-events:none;
          width:14px;height:14px;opacity:.9;transform:translate(-50%,-50%);animation:rip .55s ease-out forwards}
  @keyframes rip{from{width:8px;height:8px;opacity:.85}to{width:46px;height:46px;opacity:0}}
  #caption{position:fixed;left:50%;bottom:42px;transform:translateX(-50%);z-index:38;max-width:min(900px,92vw);
           background:rgba(22,27,34,.94);border:1px solid var(--border);border-left:3px solid var(--kimi);
           border-radius:10px;padding:10px 16px;backdrop-filter:blur(4px);opacity:0;transition:opacity .35s;
           box-shadow:0 8px 30px rgba(0,0,0,.45)}
  #caption.show{opacity:1}
  #caption .ct{font-size:14px;font-weight:600;color:var(--text)}
  #caption .cs{font-size:12px;color:var(--dim);margin-top:2px}
  #ribbon{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:42;font-size:10.5px;font-weight:700;
          letter-spacing:.6px;text-transform:uppercase;color:#0d1117;background:var(--lead);
          border-radius:0 0 8px 8px;padding:3px 14px;box-shadow:0 2px 8px rgba(0,0,0,.4)}

  #barfill{height:100%;width:0;background:linear-gradient(90deg,var(--kimi),var(--opencode));transition:width .2s linear}
  #ctl{position:fixed;right:14px;bottom:16px;z-index:43;display:flex;gap:8px;align-items:center}
  #ctl button{cursor:pointer;background:var(--panel);border:1px solid var(--border);color:var(--text);
              border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}
  #ctl button:hover{border-color:var(--kimi)}
  #ctl .clk{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}

const clone = o => JSON.parse(JSON.stringify(o));

// ── DOM helpers (text only, never innerHTML — XSS-safe, faithful to hub) ─────
function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text != null) e.textContent = text;
  return e;
}
function span(text, color){ const s = el("span", null, text); if(color) s.style.color = color; return s; }
const KNOWN = ["codex","kimi","opencode","claude","claude-lead","any","detached"];
function badge(a){ return el("span", "badge b-" + (KNOWN.includes(a)?a:"any"), a); }

// ── Tabs ─────────────────────────────────────────────────────────────────────
function renderTabs(){
  const host = document.getElementById("tabs");
  host.replaceChildren();
  const ov = el("div", "tab" + (CURRENT==="overview" ? " active" : ""), "Overview");
  ov.dataset.tab = "overview";
  host.appendChild(ov);
  for(const p of STATE.overview.projects){
    const t = el("div", "tab" + (CURRENT===p.id ? " active" : ""));
    t.dataset.tab = p.id;
    t.appendChild(el("span", null, p.name));
    if(!p.missing && p.counts){
      if(p.counts.claimed) { t.appendChild(el("span","mini hot", p.counts.claimed + "▶")); }
      if(p.counts.failed)  { t.appendChild(el("span","mini bad", p.counts.failed + "✗")); }
      t.appendChild(el("span","mini", "✓" + p.counts.approved));
    }
    host.appendChild(t);
  }
}

// ── Board cards (faithful port of hub makeCard) ──────────────────────────────
function makeCard(t, kind){
  const agent = t.agent || t.assigned_to || "any";
  const cls = "card" + (kind==="failed"?" failed":kind==="claimed"?" working":(kind==="completed"||kind==="approved")?" done":"")
            + (t._anim?" anim":"");
  const c = el("div", cls);
  c.appendChild(el("div", "t", t.title || "(untitled)"));
  const m = el("div", "m");
  m.appendChild(badge(agent));
  if(kind==="pending"){
    m.appendChild(span("p" + t.priority));
    if(t.auth_requeue_count > 0) m.appendChild(span("⏸ auth retry " + t.auth_requeue_count, "var(--work)"));
    if(t.rerouted_from) m.appendChild(span("↪ from " + t.rerouted_from, "var(--work)"));
  }
  if(kind==="completed"){ m.appendChild(span("✓","var(--ok)")); m.appendChild(span((t.completed_at||"").slice(11,19))); }
  if(kind==="failed"){ m.appendChild(span("✗ exit " + (t.exit_code ?? "?"), "var(--fail)")); }
  if(kind==="claimed"){ const d = el("span","dot pulse"); d.style.background=t.leader_run?"var(--lead)":"var(--work)"; m.appendChild(d); m.appendChild(span(t.leader_run ? "LEADER ▶ detached run" : (t.detached?"detached run…":"working…"), t.leader_run?"var(--lead)":null)); }
  if(kind==="approved"){ m.appendChild(span("✓","var(--ok)")); if(t.phase) m.appendChild(span("P"+t.phase)); }
  c.appendChild(m);
  c.appendChild(el("div", "tid", t.task_id));
  return c;
}
function fill(id, arr, kind){
  const host = document.getElementById(id);
  host.replaceChildren();
  if(!arr.length){ host.appendChild(el("div","empty","—")); return; }
  for(const t of arr) host.appendChild(makeCard(t, kind));
}

// ── Agent header strip (faithful + an instance ×N count: kimi×3/opencode×3) ─
function renderAgents(agents, claimed){
  const host = document.getElementById("agents");
  host.replaceChildren();
  if(!agents) return;
  const busy = {};
  for(const c of (claimed||[])){ if(c.agent && !c.detached) busy[c.agent] = (busy[c.agent]||0)+1; }
  for(const [a, s] of Object.entries(agents)){
    const wrap = el("div", "agent");
    const working = (s.status==="working") || busy[a];
    const dot = el("span", (working||s.status==="leading") ? "dot pulse" : "dot");
    dot.style.background = working ? "var(--work)" : s.status==="leading" ? "var(--lead)" : "var(--dim)";
    wrap.appendChild(dot);
    wrap.appendChild(badge(a));
    if(busy[a] > 1) wrap.appendChild(el("span","xn","×"+busy[a]));
    const info = working ? "working…" : (s.role || s.status);
    wrap.appendChild(el("span", "role", info));
    host.appendChild(wrap);
  }
}

// ── Progress / pipeline line (faithful port) ─────────────────────────────────
function renderProgress(d){
  const host = document.getElementById("progress");
  host.replaceChildren();
  host.appendChild(el("span","big","✓ " + d.counts.approved + " approved"));
  const counts = d.phase_counts || {};
  const meta = d.phases_meta || {};
  const phases = meta.phases;
  const pstate = d.phase_state;
  if(pstate === "awaiting_definition"){
    host.appendChild(el("span","lbl","pipeline"));
    const c = el("span","chip","⏳ awaiting leader definition"); c.style.borderColor = "var(--work)";
    host.appendChild(c);
  } else if(phases && phases.length){
    const ICON = {done:"✓", active:"▶", blocked:"⛔", pending:"·"};
    const total = phases.length;
    const done = phases.filter(p => p.status === "done").length;
    const active = phases.filter(p => p.status === "active");
    const key = "fleetPhases:" + CURRENT;
    const stored = localStorage.getItem(key);
    const collapsed = stored ? (stored === "closed") : (total > 6);
    const head = el("span", "phasetoggle");
    if(collapsed){
      let summ;
      if(active.length){ const a = active[0]; summ = "▶ P" + a.id + " " + a.name + (active.length > 1 ? " +" + (active.length - 1) : ""); }
      else if(done === total){ summ = "✓ all done"; }
      else { const np = phases.find(p => p.status !== "done"); summ = np ? "· next P" + np.id : "· pending"; }
      head.textContent = "▸ " + (meta.title || "pipeline") + " — " + summ + " · " + done + "/" + total;
    } else { head.textContent = "▾ " + (meta.title || "pipeline"); }
    head.onclick = () => { localStorage.setItem(key, collapsed ? "open" : "closed"); renderProgress(d); };
    host.appendChild(head);
    if(!collapsed){
      for(const p of phases){
        const n = counts[p.id] || 0;
        const icon = ICON[p.status] || "·";
        let txt = "P" + p.id + " " + p.name + " " + icon;
        if(p.gate) txt += " " + p.gate;
        if(n) txt += " (" + n + "t)";
        const chip = el("span","chip",txt);
        if(p.status==="done") chip.style.borderColor = "var(--ok)";
        else if(p.status==="active") chip.style.borderColor = "var(--work)";
        else if(p.status==="blocked") chip.style.borderColor = "var(--fail)";
        host.appendChild(chip);
      }
    }
  } else if(pstate === "no_pipeline"){ /* flat one-shot */ }
  else {
    host.appendChild(el("span","lbl","by phase"));
    Object.keys(counts).sort().forEach(p => host.appendChild(el("span","chip","Phase " + p + ": " + counts[p])));
  }
  host.appendChild(el("span","lbl","live"));
  host.appendChild(el("span","chip", d.counts.pending + " pending"));
  host.appendChild(el("span","chip", d.counts.claimed + " in-progress"));
  host.appendChild(el("span","chip", d.counts.completed + " awaiting QA"));
  if(d.counts.drafts) host.appendChild(el("span","chip", d.counts.drafts + " drafts (held)"));
  if(d.counts.failed) host.appendChild(el("span","chip", d.counts.failed + " failed"));
}

// ── Leader-continuity strip (faithful port) ──────────────────────────────────
function renderContinuity(c){
  const host = document.getElementById("continuity");
  host.replaceChildren();
  if(!c){ host.style.display = "none"; return; }
  host.style.display = "flex";
  host.appendChild(el("span","lbl","leader continuity"));
  function chip(on, txt, half){
    const s = el("span","chip",(on ? "● " : half ? "◐ " : "○ ") + txt);
    s.style.borderColor = on ? "var(--ok)" : half ? "var(--work)" : "var(--border)";
    if(!on && !half) s.style.color = "var(--dim)";
    return s;
  }
  host.appendChild(chip(c.wait_sentinels > 0, "wait sentinels ×" + c.wait_sentinels));
  host.appendChild(chip(c.qa_notify, "qa_notify"));
  let cronTxt = "durable cron";
  if(c.durable_cron_present) cronTxt += c.durable_cron >= 0 ? " ×" + c.durable_cron : " (present)";
  host.appendChild(chip(c.durable_cron_present && c.durable_cron !== 0, cronTxt));
  host.appendChild(el("span","lbl","← in-memory /loop crons leave no disk trace, can't show here"));
  const ld = c.launchd || {};
  let ltxt = "launchd";
  if(ld.installed) ltxt += ld.loaded ? " loaded" : " INSTALLED·UNLOADED";
  if(ld.interval) ltxt += " · " + Math.round(ld.interval/60) + "m";
  host.appendChild(chip(ld.installed && ld.loaded, ltxt, ld.installed && !ld.loaded));
  host.appendChild(chip(c.caretaker, "caretaker (no-LLM floor)"));
  if(c.last_pass_age_s != null){
    const m = Math.round(c.last_pass_age_s/60);
    host.appendChild(el("span","chip","last pass " + (m < 60 ? m + "m" : Math.round(m/60) + "h") + " ago"));
  }
}

      nums.appendChild(span(p.counts.completed + " QA", "#58a6ff"));
      nums.appendChild(span("✓" + p.counts.approved, "var(--ok)"));
      if(p.counts.failed) nums.appendChild(span(p.counts.failed + " ✗", "var(--fail)"));
    }
    head.appendChild(nums);
    box.appendChild(head);
    const hot = el("div","hot");
    for(const c of (p.claimed||[])) hot.appendChild(el("span","hotcard","▶ [" + c.agent + "] " + c.title));
    for(const f of (p.failed||[]))  hot.appendChild(el("span","hotcard f","✗ " + f.title));
    if(hot.childNodes.length) box.appendChild(hot);
    host.appendChild(box);
  }
}

// ── faux "live" status pill (mimics the real staleness indicator) ────────────
function paintStatus(){
  const up = document.getElementById("updated"); if(!up) return;
  up.replaceChildren();
  const dot = el("span","dot pulse"); dot.style.background="var(--ok)";
  up.appendChild(dot);
  up.appendChild(document.createTextNode(" live · " + STATE.clock + " (1s ago)"));
}

// ── master render: read STATE, paint whichever tab is current ────────────────
function render(){
  renderTabs();
  const ovEl = document.getElementById("overview");
  const bdEl = document.getElementById("board");
  const prEl = document.getElementById("progress");
  const ctEl = document.getElementById("continuity");
  if(CURRENT === "overview"){
    ovEl.style.display = "flex"; bdEl.style.display = "none";
    prEl.style.display = "none"; ctEl.style.display = "none";
    renderAgents(null); renderOverview(STATE.overview);
  } else {
    ovEl.style.display = "none"; bdEl.style.display = "grid"; prEl.style.display = "flex";
    const d = STATE.projects[CURRENT];
    for(const k of ["pending","claimed","completed","failed","approved"])
      document.getElementById("n-"+k).textContent = d.counts[k];
    fill("c-pending", d.pending, "pending");
    fill("c-claimed", d.claimed, "claimed");
    fill("c-completed", d.completed, "completed");
    fill("c-approved", d.approved, "approved");
    fill("c-failed", d.failed, "failed");
    renderAgents(d.agents, d.claimed);
    renderProgress(d);
    renderContinuity(d.continuity);
  }
  paintStatus();
}

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║  SIMULATION — fabricated 05 worker wave (demo spec).                       ║
// ║  Instance caps: kimi×3, opencode×3, codex×1, claude×1. Per-agent           ║
// ║  completions are STAGGERED (no two same-agent Done at the same instant).   ║
// ║  Cycle = 120s; some tasks (codex) stay In Progress when it loops.          ║
// ╚══════════════════════════════════════════════════════════════════════════╝
const CYCLE = 120;                 // seconds per loop (2 minutes)

// Each task derives its column purely from elapsed vs its timestamps.
// appear→pending, claim→in-progress(working), done→Done·QA, approve→Approved.
// done:null / approve:null  ⇒  stays in that state through the loop (realistic).
// kimi done@15s, opencode#1 done@30s are the demo's explicit anchors.
const WAVE = [
  {id:"sim-k1", agent:"kimi",     phase:"4", title:"Lit synthesis: selective-prediction calibration under distribution shift", appear:24, claim:26, done:41, approve:46},
  {id:"sim-o1", agent:"opencode", phase:"4", title:"Add within-seed paired bootstrap to dose-response runner (rework §2)",    appear:24, claim:28, done:58, approve:63},
  {id:"sim-k2", agent:"kimi",     phase:"4", title:"Synthesize dose-response across 5 seeds (paired CIs)",                    appear:24, claim:30, done:55, approve:60},
  {id:"sim-cl", agent:"claude",   phase:"4", title:"Validation report §4 — honest directional-replication verdict",          appear:24, claim:32, done:69, approve:74},
  {id:"sim-o2", agent:"opencode", phase:"4", title:"Sibling tests for estimator.py (numerical exactness)",                   appear:24, claim:34, done:76, approve:81},
  {id:"sim-k3", agent:"kimi",     phase:"4", title:"Cross-check replication formula vs reference implementation",            appear:24, claim:37, done:86, approve:91},
  {id:"sim-o3", agent:"opencode", phase:"4", title:"Aggregator: merge per-cell results → synthesis inputs",                  appear:24, claim:40, done:107,approve:112},
  {id:"sim-cx", agent:"codex",    phase:"4", title:"Banded evidence-permutation sampler — dedup + p*=0.95 correctness",      appear:24, claim:43, done:null,approve:null},
];

// Captions: {t, title, sub, accent?}
const CAPS = [
  {t:0.4,  title:"Overview — one hub, every project",                  sub:"Per-project counts + the global token-capacity line. codex telemetry sample (5h 38% · wk 19%).", accent:"--lead"},
  {t:6.3,  title:"01 · Northwind Platform Revamp",                     sub:"56 tasks approved · 12-phase pipeline complete (collapsed → ✓ all done).", accent:"--opencode"},
  {t:12.3, title:"04 · Horizon Analytics — large-scale benchmark elevation", sub:"215 tasks approved across a 14-phase research pipeline — heavy parallel throughput.", accent:"--codex"},
  {t:18.3, title:"05 · Atlas Research replication — Phase 4 active",  sub:"A multi-day detached large-model fine-tune is mid-run. Now watch the worker fleet take a fresh wave.", accent:"--kimi"},
  {t:24.3, title:"Leader dispatches a wave → 8 tasks land in Pending", sub:"Self-contained specs, routed assigned_to:any. The atomic claim race is the load balancer.", accent:"--work"},

// ── cursor + click ───────────────────────────────────────────────────────────
const cursor = document.getElementById("cursor");
function moveCursorTo(sel){
  const t = document.querySelector(sel); if(!t) return;
  const r = t.getBoundingClientRect();
  cursor.style.left = (r.left + r.width/2 - 4) + "px";
  cursor.style.top  = (r.top + r.height/2 - 2) + "px";
}
function clickFx(){
  cursor.classList.add("press"); setTimeout(()=>cursor.classList.remove("press"), 180);
  const r = cursor.getBoundingClientRect();
  const rip = el("div","ripple");
  rip.style.left = (r.left+4) + "px"; rip.style.top = (r.top+2) + "px";
  document.body.appendChild(rip); setTimeout(()=>rip.remove(), 600);
}
// scripted tab visits: cursor glides, then "clicks" and switches
const TABS_SEQ = [
  {t:1,  id:"overview"},
  {t:5.4,id:ORDER[1]},   // 01
  {t:11.4,id:ORDER[2]},  // 04
  {t:17.4,id:ORDER[0]},  // 05 (demo project — first in order)
];

// ── caption display ────────────────────────────────────────────────────────
let capShownIdx = -1;
function showCaption(c){
  const box = document.getElementById("caption");
  box.querySelector(".ct").textContent = c.title;
  box.querySelector(".cs").textContent = c.sub || "";
  box.style.borderLeftColor = "var(" + (c.accent||"--kimi") + ")";
  box.classList.add("show");
}

// ── per-tick state assembly for the demo project ─────────────────────────────
function rebuildDemoProject(elapsed){
  const proj = STATE.projects[DEMO_PID];
  const base = BASE.projects[DEMO_PID];
  // start from the pristine real base (detached cards + real approved)
  proj.pending   = clone(base.pending);
  proj.claimed   = clone(base.claimed);
  proj.completed = clone(base.completed);
  proj.approved  = clone(base.approved);
  proj.phase_counts = clone(base.phase_counts || {});
  // reset agent working state to idle (leader keeps leading)
  for(const a of Object.keys(proj.agents)){
    if(a === "claude-lead") continue;
    proj.agents[a] = {status:"idle", task_id:null, title:null, role:base.agents[a].role};
  }
  // place each fabricated task by its lifecycle timestamps
  for(const w of WAVE){
    if(elapsed < w.appear) continue;
    const card = {task_id:w.id, title:w.title, agent:w.agent, assigned_to:w.agent,
                  type:"code", phase:w.phase, priority:4, _anim:(elapsed - w.appear) < 1.2};
    if(elapsed < w.claim){
      proj.pending.unshift(card);
    } else if(w.done == null || elapsed < w.done){
      proj.claimed.unshift({task_id:w.id, title:w.title, agent:w.agent, type:"code", phase:w.phase});
      const s = proj.agents[w.agent]; if(s){ s.status="working"; s.task_id=w.id; s.title=w.title; }
    } else if(w.approve == null || elapsed < w.approve){
      proj.completed.unshift({task_id:w.id, title:w.title, agent:w.agent, phase:w.phase,
                              completed_at: STATE.clockISO});
    } else {
      proj.approved.unshift({task_id:w.id, title:w.title, agent:w.agent, phase:w.phase,
                             completed_at: STATE.clockISO});
      proj.phase_counts[w.phase] = (proj.phase_counts[w.phase]||0) + 1;
    }
  }
  proj.counts = {pending:proj.pending.length, claimed:proj.claimed.length,
                 completed:proj.completed.length, failed:proj.failed.length,
                 approved:proj.approved.length, drafts:(proj.drafts||[]).length};
  // mirror this project's counts onto the Overview row (overview hides detached,
  // so keep its base counts but reflect the live approved/claimed deltas)
  const ovRow = STATE.overview.projects.find(p => p.id === DEMO_PID);
  const ovBase = BASE.overview.projects.find(p => p.id === DEMO_PID);
  if(ovRow){
    const demoApproved = WAVE.filter(w => w.approve != null && elapsed >= w.approve).length;
    const demoClaimed  = WAVE.filter(w => elapsed >= w.claim && (w.done==null||elapsed<w.done)).length;
    const demoPending  = WAVE.filter(w => elapsed >= w.appear && elapsed < w.claim).length;
    const demoQA       = WAVE.filter(w => w.done!=null && elapsed>=w.done && (w.approve==null||elapsed<w.approve)).length;
    ovRow.counts = {pending: ovBase.counts.pending + demoPending,
                    claimed: ovBase.counts.claimed + demoClaimed,
                    completed: ovBase.counts.completed + demoQA,
                    failed: ovBase.counts.failed,
                    approved: ovBase.counts.approved + demoApproved};
    ovRow.claimed = proj.claimed.filter(c=>!c.detached).slice(0,8).map(c=>({task_id:c.task_id,title:c.title,agent:c.agent}));
  }
}

// ── clock (faux, advances with the cycle so the live pill looks real) ─────────
function setClock(elapsed){
  // anchor to the real capture time, advance by elapsed
  const base = new Date(Date.parse(SNAPSHOT.updated_iso) + elapsed*1000);
  const hh = String(base.getUTCHours()).padStart(2,"0");
  const mm = String(base.getUTCMinutes()).padStart(2,"0");
  const ss = String(base.getUTCSeconds()).padStart(2,"0");
  STATE.clock = hh+":"+mm+":"+ss;
  STATE.clockISO = base.toISOString().slice(0,19)+"Z";
}

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║  DRIVER                                                                    ║
// ╚══════════════════════════════════════════════════════════════════════════╝
let cycleStart = performance.now();
let paused = false, pausedAt = 0, pausedAccum = 0;
let lastTabIdx = -1;

function resetCycle(){
  STATE = clone(BASE);
  CURRENT = "overview";
  capShownIdx = -1; lastTabIdx = -1;
  document.getElementById("caption").classList.remove("show");
  cycleStart = performance.now(); pausedAccum = 0;
  moveCursorTo('.tab[data-tab="overview"]');
  render();
}

function fmt(t){ const m=Math.floor(t/60), s=Math.floor(t%60); return m+":"+String(s).padStart(2,"0"); }

function tick(){
  if(paused){ requestAnimationFrame(tick); return; }
  const elapsed = (performance.now() - cycleStart - pausedAccum)/1000;
  if(elapsed >= CYCLE){ resetCycle(); requestAnimationFrame(tick); return; }

  setClock(elapsed);

  // scripted tab = a PURE FUNCTION of elapsed (robust to frame throttling; no setTimeout race)
  let scriptedTab = "overview";
  for(const ev of TABS_SEQ){ if(elapsed >= ev.t) scriptedTab = ev.id; }
  // glide the cursor onto the NEXT tab ~0.85s before that switch fires (the visible "aim")
  for(const ev of TABS_SEQ){ if(ev.t > elapsed && ev.t - elapsed <= 0.9){ moveCursorTo('.tab[data-tab="'+ev.id+'"]'); break; } }
  if(scriptedTab !== CURRENT){ CURRENT = scriptedTab; moveCursorTo('.tab[data-tab="'+scriptedTab+'"]'); clickFx(); }
  // a small cursor drift toward the demo board so it isn't frozen during the wave
  if(elapsed > 24 && CURRENT === DEMO_PID){
    if(Math.floor(elapsed) % 8 === 0) moveCursorTo('#c-claimed');
    else if(Math.floor(elapsed) % 8 === 4) moveCursorTo('#c-approved');
  }

  // captions
  let active = -1;
  for(let i=0;i<CAPS.length;i++){ if(elapsed >= CAPS[i].t) active = i; }
  if(active !== capShownIdx && active >= 0){ capShownIdx = active; showCaption(CAPS[active]); }

  // demo project state
  rebuildDemoProject(elapsed);
  render();

  // progress bar + clock readout
  document.getElementById("barfill").style.width = (100*elapsed/CYCLE) + "%";
  document.getElementById("clk").textContent = fmt(elapsed) + " / 2:00";

  requestAnimationFrame(tick);
}

// controls
document.getElementById("pause").addEventListener("click", function(){
  paused = !paused;
  this.textContent = paused ? "▶ Play" : "⏸ Pause";
  if(paused){ pausedAt = performance.now(); }
  else { pausedAccum += performance.now() - pausedAt; }
});
document.getElementById("replay").addEventListener("click", () => {
  paused = false; document.getElementById("pause").textContent = "⏸ Pause";
  resetCycle();
});

// boot
render();
moveCursorTo('.tab[data-tab="overview"]');
requestAnimationFrame(tick);
</script>
